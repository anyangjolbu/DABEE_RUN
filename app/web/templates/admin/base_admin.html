<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}관리자{% endblock %} — DABEE Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tokens.css" />
  {% block head %}{% endblock %}
</head>
<body class="admin-body">
  <div class="admin-layout">

    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <span class="brand-name">DABEE</span>
        <span class="brand-suffix">Run</span>
        <span class="admin-badge">관리자</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin"            class="{% if active == 'dashboard'  %}active{% endif %}">대시보드</a>
        <a href="/admin/keywords"   class="{% if active == 'keywords'   %}active{% endif %}">키워드 관리</a>
        <a href="/admin/recipients" class="{% if active == 'recipients' %}active{% endif %}">수신자 관리</a>
      </nav>

      <div class="sidebar-footer">
        <a href="/" target="_blank" class="sidebar-link">← 공개 사이트</a>
        <button class="btn-link" id="logoutBtn">로그아웃</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-content">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>

  <script src="/static/js/admin/admin.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
