<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}관리자{% endblock %} — DABEE Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tokens.css" />
  {% block head %}{% endblock %}
</head>
<body class="admin-body">
  <div class="admin-layout">

    <aside class="admin-sidebar">
      <div class="sidebar-logo">
        <span class="dabee">DABEE</span><span class="run">RUN</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin"            class="{% if active == 'dashboard'  %}active{% endif %}">▣ Dashboard</a>
        <a href="/admin/keywords"   class="{% if active == 'keywords'   %}active{% endif %}">⌕ Keywords</a>
        <a href="/admin/recipients" class="{% if active == 'recipients' %}active{% endif %}">✉ Recipients</a>
      </nav>

      <span class="sidebar-sp"></span>

      <div class="sidebar-footer">
        <a href="/" target="_blank">⊞ 공개 사이트</a>
        <button id="logoutBtn">⏻ 로그아웃</button>
      </div>
    </aside>

    <main class="admin-main">
      {% block content %}{% endblock %}
    </main>

  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="/static/js/admin/admin.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
