{% extends "admin/base_admin.html" %}
{% block title %}키워드 관리{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">키워드 관리</h1>
  <div class="page-actions">
    <button class="btn btn-secondary" id="addThemeBtn">+ 테마 추가</button>
    <button class="btn btn-primary"   id="saveBtn">저장</button>
  </div>
</div>

<!-- 스케줄 설정 -->
<div class="card">
  <div class="card-title">수집 설정</div>
  <div class="form-row">
    <div class="form-group">
      <label>수집 주기 (분)</label>
      <input type="number" id="schedInterval" class="input-field" style="width:120px;" min="1" max="60" />
    </div>
    <div class="form-group">
      <label>기사 만료 (시간)</label>
      <input type="number" id="expireHours" class="input-field" style="width:120px;" min="1" max="72" />
    </div>
  </div>
</div>

<!-- 검색 테마 -->
<div class="card">
  <div class="card-title">검색 테마</div>
  <div id="themeList"></div>
</div>

<!-- 블랙리스트 -->
<div class="card">
  <div class="card-title">도메인 블랙리스트</div>
  <p class="muted" style="margin-bottom:var(--space-3);">URL에 아래 문자열이 포함된 기사는 자동 제외됩니다.</p>
  <div class="chip-list" id="domainBlacklist"></div>
</div>

<div class="card">
  <div class="card-title">제목 블랙리스트</div>
  <p class="muted" style="margin-bottom:var(--space-3);">제목에 아래 단어가 포함된 기사는 자동 제외됩니다.</p>
  <div class="chip-list" id="titleBlacklist"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/admin/keywords.js"></script>
{% endblock %}
