{% extends "base.html" %}
{% block title %}피드 — DABEE Run{% endblock %}

{% block content %}

<div class="feed-toolbar">
  <div class="container">
    <select id="filterTier" class="filter-select">
      <option value="">전체 티어</option>
      <option value="1">TIER 1</option>
      <option value="2">TIER 2</option>
      <option value="3">TIER 3</option>
    </select>
    <select id="filterTheme" class="filter-select">
      <option value="">전체 테마</option>
    </select>
    <select id="filterTone" class="filter-select">
      <option value="">전체 톤</option>
      <option value="경고">경고</option>
      <option value="주의">주의</option>
      <option value="양호">양호</option>
    </select>
    <input type="search" id="filterSearch" class="filter-search" placeholder="기사 제목 검색…" />
    <button class="btn btn-reset" id="filterReset">초기화</button>
    <span class="feed-meta" id="feedCount"></span>
  </div>
</div>

<div class="feed-page">
  <div class="container">
    <div class="new-alert hidden" id="newAlert">
      <span>⚡ 신규 기사가 수집되었습니다.</span>
      <button id="newAlertBtn">새로고침</button>
    </div>

    <div class="feed-cards">
      <div class="cards-grid" id="articleList"></div>
    </div>

    <div class="feed-more" id="feedMore" style="display:none;">
      <button class="btn btn-sm" id="loadMoreBtn" style="margin:0 auto;">더 보기</button>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/static/js/feed.js"></script>
{% endblock %}
