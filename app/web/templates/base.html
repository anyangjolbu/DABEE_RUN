<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DABEE Run{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tokens.css" />
  {% block head %}{% endblock %}
</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <h1 class="logo"><span class="dabee">DABEE</span><span class="run">RUN</span></h1>
        <nav class="app-nav">
          <a class="live" href="/" id="navLive">LIVE</a>
          <a href="/feed" class="{% if active == 'feed' %}active{% endif %}">피드</a>
          <a href="/report" class="{% if active == 'report' %}active{% endif %}">리포트</a>
        </nav>
      </div>
      <div class="topbar-icons">
        <a class="icon-btn" href="/admin" aria-label="admin" title="관리자">☰</a>
      </div>
    </div>
  </header>

  {% block content %}{% endblock %}

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="/static/js/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
