<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DABEE Run{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tokens.css" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-name">DABEE</span>
      <span class="brand-suffix">Run</span>
    </div>
    <nav class="app-nav">
      <a href="/" class="{% if active == 'home' %}active{% endif %}">대시보드</a>
      <a href="/feed" class="{% if active == 'feed' %}active{% endif %}">피드</a>
      <a href="/report" class="{% if active == 'report' %}active{% endif %}">리포트</a>
    </nav>
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span class="label">연결 중...</span>
    </div>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
